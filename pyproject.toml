# pyproject.toml

# ================================================================
# PYTHON LINTING, FORMATTING & TYPE CHECKING
# ================================================================
# ----------------------------------------------------------------
# ruff
# ----------------------------------------------------------------
[tool.ruff]
# Lint/type-check baseline matching CI and the open-source stack (see
# requirements.txt). Scripts that run inside ArcGIS Pro's bundled Python
# additionally keep a 3.9 runtime floor, enforced by
# dev_tools/audit_python_floor.py rather than by ruff, because tier
# membership is import-based (arcpy/Pro-bundled vs geopandas stack) and
# can't be expressed as a filename glob.
target-version = "py312"
line-length    = 100

[tool.ruff.lint]
# ----------------------------------------------------------------
# Rule selection
# ----------------------------------------------------------------
select = [
    # --- Import hygiene ---
    "I",    # isort: enforces a consistent import order (stdlib →
            #   third-party → first-party), grouped and alphabetized.
    "F",    # Pyflakes: catches unused imports, undefined names,
            #   redefinitions, unused variables

    # --- Documentation ---
    "D",    # pydocstyle: enforces docstring presence and formatting.
            #   Convention is pinned to Google style below.

    # --- Typing ---
    "ANN",  # flake8-annotations: requires type hints on function
            #   signatures
    "TC",   # flake8-type-checking: flags imports used *only* in
            #   annotations and suggests moving them under
            #   `if TYPE_CHECKING:` to avoid runtime cost.

    # --- General code quality ---
    "B",    # flake8-bugbear: opinionated checks for likely bugs
            #   and design problems
    "E",    # pycodestyle errors: PEP 8 layout rules
            #   (indentation, whitespace, statement structure).
    "W",    # pycodestyle warnings: softer PEP 8 issues
            #   (trailing whitespace, deprecated syntax).

    # --- Domain-specific ---
    "PD",   # pandas-vet: catches common pandas anti-patterns —
            #   chained .ix/.iat misuse, inplace=True,
            #   df.values over df.to_numpy(), etc.
            #   High value here because most of the repo is
            #   pandas/geopandas pipelines.
    "T20",  # flake8-print: bans print() and pprint()
            #   (T201, T203). CONTRIBUTING.md mandates logging
            #   instead, so this enforces the stated policy in CI
            #   rather than relying on reviewer memory.
]

# ----------------------------------------------------------------
# Auto-fixable rules
# ----------------------------------------------------------------
# Ruff *can* auto-fix many rules, but this list restricts which
# ones it's *allowed* to touch via `--fix`. The intent is "fix
# only changes that are mechanical and unambiguous"; everything
# else should require a human decision.
fixable = [
    "F401", # Unused imports — safe to remove automatically.
    "D",    # Docstring formatting (quote style, period at end of
            #   summary line, blank-line placement).
    "I",    # Import ordering — purely a sort operation.
]

# ----------------------------------------------------------------
# Suppressed rules
# ----------------------------------------------------------------
ignore = [
    "ANN401", # Allow `typing.Any`. Strict typing is the goal, but
              #   wrapping arcpy/geopandas/3rd-party return values
              #   in `Any` is sometimes the only honest annotation.
    "TC002",  # Don't force third-party imports used only in type
              #   hints into a `TYPE_CHECKING` block. The runtime
              #   cost is negligible for this repo and the
              #   refactor noise isn't worth it.
    "TC003",  # Same rationale for standard-library imports.
    "B905",   # zip() without strict= is tolerated: ArcPro-tier scripts
              #   (arcpy + anything runnable on Pro's bundled stack)
              #   keep a Python 3.9 floor, where strict= doesn't exist
              #   (added in 3.10). See dev_tools/audit_python_floor.py.
]

[tool.ruff.lint.per-file-ignores]
# Keep tests lean: skip module docstrings and param annotations for fixtures.
"tests/**/*" = ["D100", "D101", "D102", "D103", "D104", "D105", "D106", "D107", "ANN001"]
# dev_tools are CLI scripts where print() is the intended output mechanism.
"dev_tools/**/*" = ["T201"]
# These national_data_tools scripts prompt interactively; print() is feedback paired with input(), not logging.
"scripts/national_data_tools/clean_*.py" = ["T201"]
"scripts/national_data_tools/schools_prep_join_gpd.py" = ["T201"]
# arcpy scripts target the ArcPy-bundled Python (<3.10) where zip() has no strict= parameter.
"**/*arcpy*" = ["B905"]

[tool.ruff.lint.pydocstyle]
convention = "google"

# ----------------------------------------------------------------
# ty
# ----------------------------------------------------------------
[tool.ty]

[tool.ty.src]
exclude = ["**/*arcpy*"]

[tool.ty.environment]
python-version = "3.12"
extra-paths = ["scripts/ridership_tools", "scripts/operations_tools"]

[tool.ty.rules]
unsupported-operator = "error"
# Restored to "error": the typing stubs in requirements-dev.txt let ty resolve
# every third-party import in the CI-checked tree (0 diagnostics as of
# ty 0.0.56), so any new hit is a genuine typo or missing dependency.
unresolved-import = "error"
# Still "warn": 5 pre-existing diagnostics, mostly geopandas/shapely signatures
# where the runtime type is fine (e.g. GeoDataFrame ops typed as returning
# DataFrame). Promote alongside the stub-noise rules below once those call
# sites are cleaned up.
invalid-return-type = "warn"
# Downgraded from "error" to "warn" to unblock CI: these fire only on
# pre-existing diagnostics (~165 as of ty 0.0.56), dominated by
# pandas-stubs/geopandas overload noise. They stay visible as warnings;
# restore to "error" after a dedicated type-cleanup pass.
invalid-assignment = "warn"
invalid-argument-type = "warn"
not-subscriptable = "warn"
not-iterable = "warn"
no-matching-overload = "warn"
invalid-parameter-default = "error"
possibly-missing-attribute = "warn"
redundant-cast = "error"
unresolved-reference = "error"
unresolved-attribute = "warn"
unresolved-global = "warn"

# ================================================================
# COMMIT MESSAGE LINTING
# ================================================================
