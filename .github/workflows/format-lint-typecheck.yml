# .github/workflows/format-lint-typecheck.yml
name: format-lint-typecheck

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format-lint:
    concurrency:
      group: format-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          fi
          pip install -r requirements-dev.txt

      - name: Check formatting with Ruff
        run: ruff format --check .

      - name: Lint with Ruff
        run: ruff check .

      - name: Audit Python version floors
        # ArcPro-tier scripts (arcpy + anything runnable on Pro's bundled
        # stack) must stay Python 3.9 compatible; see CONTRIBUTING.md.
        run: python dev_tools/audit_python_floor.py

      - name: Type check with Ty
        # ty is pre-1.0 and currently surfaces pandas/geopandas-stubs typing noise as
        # warning-level diagnostics; a newer ty started exiting non-zero on warnings.
        # --exit-zero-on-warning keeps those warnings advisory (still printed in the log)
        # while error-level diagnostics continue to fail the build.
        run: ty check scripts --exclude "**/*arcpy*" --exit-zero-on-warning
